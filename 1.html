<!DOCTYPE html>
<html>
<head>
    <title>Algoritma Sorting & Searching</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Sorting & Searching</h2>

<input type="text" id="dataInput" placeholder="Contoh: 5,2,9,1,7">
<input type="number" id="searchInput" placeholder="Cari angka">

<br>

<button id="mergeBtn">Merge Sort</button>
<button id="quickBtn">Quick Sort</button>
<button id="linearBtn">Linear Search</button>
<button id="binaryBtn">Binary Search</button>


<div class="box">
    <p><b>Data:</b> <span id="data"></span></p>
    <p><b>Hasil:</b> <span id="result"></span></p>
    <p><b>Langkah:</b></p>
    <pre id="log"></pre>
</div>

<script src="1.js"></script>
</body>
</html>
